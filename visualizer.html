<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STARMILK | Visualizer</title>
  <meta name="description" content="Ambient visual listening experience — loop STARMILK art while the music plays." />
  <meta name="theme-color" content="#0b0e1a" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23c9944a'/%3E%3Cstop offset='50%25' stop-color='%236b5b8a'/%3E%3Cstop offset='100%25' stop-color='%234a5578'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35' fill='url(%23g)'/%3E%3C/svg%3E" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "STARMILK Visualizer",
    "description": "Ambient visual listening experience — loop STARMILK art while the music plays.",
    "isPartOf": {
      "@type": "WebSite",
      "name": "STARMILK",
      "url": "https://pureplatinum765-collab.github.io/starmilk-music/"
    },
    "creator": {
      "@type": "SoftwareApplication",
      "name": "Perplexity Computer",
      "url": "https://www.perplexity.ai/computer"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0e1a;
      --card: #121827;
      --purple: #6b5b8a;
      --gold: #c9944a;
      --gold-light: #dbb87a;
      --text: #d5cfc2;
      --muted: #8c8578;
      --radius: 14px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* ── Visual layers ── */
    .viz-layer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.8s ease;
      z-index: 0;
    }
    .viz-layer.active { opacity: 1; }
    video.viz-layer { filter: saturate(0.75) contrast(1.05); }
    img.viz-layer { filter: saturate(0.8) contrast(1.05); }
    .viz-layer.void-bg { background: var(--bg); }

    /* ── Dark vignette overlay ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(11,14,26,.55) 100%),
        linear-gradient(to bottom, rgba(11,14,26,.3) 0%, transparent 12%, transparent 88%, rgba(11,14,26,.5) 100%);
    }

    /* ── Controls UI ── */
    .viz-ui {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 1.2rem 1.5rem 1.5rem;
      background: linear-gradient(to top, rgba(11,14,26,.9) 0%, rgba(11,14,26,.5) 60%, transparent 100%);
      display: flex;
      flex-direction: column;
      gap: .8rem;
      transition: opacity .5s ease;
    }
    .viz-ui.hidden { opacity: 0; pointer-events: none; }

    .viz-title {
      font-size: .6rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
    }

    .viz-track {
      text-align: center;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: .04em;
      opacity: .85;
      min-height: 1.4em;
    }

    /* ── Visual toggle strip ── */
    .viz-toggles {
      display: flex;
      justify-content: center;
      gap: .45rem;
      flex-wrap: wrap;
    }

    .viz-toggle {
      border: 1px solid rgba(140,133,120,.2);
      background: rgba(18,24,39,.7);
      color: var(--muted);
      padding: .4rem .7rem;
      border-radius: 999px;
      font-size: .58rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .3s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      min-height: 36px;
      display: flex;
      align-items: center;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .viz-toggle:hover, .viz-toggle:focus-visible {
      border-color: var(--gold);
      color: var(--gold-light);
    }
    .viz-toggle.active {
      border-color: var(--gold);
      background: rgba(201,148,74,.12);
      color: var(--gold-light);
    }
    .viz-toggle:active { transform: scale(.96); }

    .viz-controls {
      display: flex;
      justify-content: center;
      gap: .4rem;
    }

    .viz-btn {
      border: 1px solid rgba(140,133,120,.2);
      background: rgba(18,24,39,.6);
      color: var(--text);
      padding: .45rem .8rem;
      border-radius: 999px;
      font-size: .65rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .3s ease;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: .3rem;
      touch-action: manipulation;
    }
    .viz-btn:hover { border-color: var(--gold); color: var(--gold-light); }
    .viz-btn:active { transform: scale(.96); }

    .viz-back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 10;
      border: 1px solid rgba(140,133,120,.2);
      background: rgba(18,24,39,.6);
      color: var(--muted);
      padding: .4rem .8rem;
      border-radius: 999px;
      font-size: .6rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all .3s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      min-height: 40px;
      display: inline-flex;
      align-items: center;
    }
    .viz-back:hover { color: var(--gold-light); border-color: var(--gold); }

    .viz-logo {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 10;
      font-size: .65rem;
      letter-spacing: .2em;
      color: var(--muted);
      opacity: .4;
    }

    /* ── SoundCloud embed ── */
    .viz-player {
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    .viz-player iframe {
      display: block;
      width: 100%;
      height: 110px;
      border: 0;
      border-radius: 10px;
      opacity: .85;
    }

    /* ── Ambient particle overlay ── */
    #viz-particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Tap hint ── */
    .viz-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      text-align: center;
      opacity: 0;
      transition: opacity .8s ease;
      pointer-events: none;
    }
    .viz-hint.show { opacity: 1; }
    .viz-hint p {
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    :focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }
    button:focus:not(:focus-visible),
    a:focus:not(:focus-visible) { outline: none; }

    @media (max-width: 640px) {
      .viz-ui { padding: .6rem .6rem .8rem; gap: .5rem; }
      .viz-toggle { font-size: .5rem; padding: .3rem .5rem; min-height: 32px; }
      .viz-track { font-size: .82rem; }
      .viz-btn { font-size: .55rem; padding: .35rem .6rem; min-height: 36px; }
      .viz-logo { display: none; }
      .viz-title { font-size: .5rem; }
      .viz-player iframe { height: 85px; }
      .viz-back { font-size: .55rem; padding: .35rem .6rem; min-height: 36px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ═══ Visual Layers (all videos + static image + void) ═══ -->
  <video id="viz-vision" class="viz-layer active" loop muted playsinline>
    <source src="starmilk-vision.mp4" type="video/mp4" />
  </video>

  <video id="viz-heart" class="viz-layer" loop muted playsinline preload="none">
    <source src="cosmic-heart.mp4" type="video/mp4" />
  </video>

  <video id="viz-sun" class="viz-layer" loop muted playsinline preload="none">
    <source src="dripping-sun.mp4" type="video/mp4" />
  </video>

  <video id="viz-butterfly" class="viz-layer" loop muted playsinline preload="none">
    <source src="butterfly-infinity.mp4" type="video/mp4" />
  </video>

  <video id="viz-wings" class="viz-layer" loop muted playsinline preload="none">
    <source src="winged-ascension.mp4" type="video/mp4" />
  </video>

  <img id="viz-wizard" class="viz-layer" src="star-wizard.jpg" alt="Star Wizard" loading="lazy" decoding="async" />

  <div id="viz-void" class="viz-layer void-bg" role="presentation"></div>

  <div class="vignette" aria-hidden="true"></div>
  <canvas id="viz-particles" aria-hidden="true"></canvas>

  <a href="index.html" class="viz-back" aria-label="Back to main site">&larr; Back</a>
  <span class="viz-logo" aria-hidden="true">STARMILK</span>

  <div class="viz-hint" id="viz-hint" aria-hidden="true">
    <p>tap anywhere to toggle controls</p>
  </div>

  <div class="viz-ui" id="viz-ui" role="region" aria-label="Visualizer controls">
    <p class="viz-title">Visual Listening Room</p>

    <!-- Visual toggles — 5 videos + 1 image + void -->
    <div class="viz-toggles" role="radiogroup" aria-label="Visual selection">
      <button class="viz-toggle active" data-visual="vision" role="radio" aria-checked="true">Chalice Dance</button>
      <button class="viz-toggle" data-visual="heart" role="radio" aria-checked="false">Cosmic Heart</button>
      <button class="viz-toggle" data-visual="sun" role="radio" aria-checked="false">Dripping Sun</button>
      <button class="viz-toggle" data-visual="butterfly" role="radio" aria-checked="false">Butterfly Infinity</button>
      <button class="viz-toggle" data-visual="wings" role="radio" aria-checked="false">Winged Ascension</button>
      <button class="viz-toggle" data-visual="wizard" role="radio" aria-checked="false">Star Wizard</button>
      <button class="viz-toggle" data-visual="void" role="radio" aria-checked="false">Deep Void</button>
    </div>

    <!-- Track controls -->
    <p class="viz-track" id="viz-track-name" aria-live="polite">Loading...</p>

    <div class="viz-controls" role="toolbar" aria-label="Playback controls">
      <button class="viz-btn" id="viz-prev" aria-label="Previous track">&#x23EE; Prev</button>
      <button class="viz-btn" id="viz-play" aria-label="Play">&#x25B6; Play</button>
      <button class="viz-btn" id="viz-next" aria-label="Next track">Next &#x23ED;</button>
      <button class="viz-btn" id="viz-shuffle" aria-label="Shuffle tracks">&#x1F500; Shuffle</button>
    </div>

    <!-- SoundCloud embed -->
    <div class="viz-player">
      <div id="viz-embed"></div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    const SC_API_URL = 'https://w.soundcloud.com/player/api.js';
    const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let scAPILoaded = false;
    let scWidget = null;

    const loadSCAPI = () => new Promise((resolve) => {
      if (scAPILoaded && typeof SC !== 'undefined' && SC.Widget) { resolve(true); return; }
      const script = document.createElement('script');
      script.src = SC_API_URL;
      script.onload = () => { scAPILoaded = true; resolve(true); };
      script.onerror = () => resolve(false);
      document.head.appendChild(script);
    });

    /* ══════════════════════════════════════════════════════════
       VISUAL TOGGLING — manage all video/image layers
       ══════════════════════════════════════════════════════════ */
    const layers = {
      vision:    document.getElementById('viz-vision'),
      heart:     document.getElementById('viz-heart'),
      sun:       document.getElementById('viz-sun'),
      butterfly: document.getElementById('viz-butterfly'),
      wings:     document.getElementById('viz-wings'),
      wizard:    document.getElementById('viz-wizard'),
      void:      document.getElementById('viz-void')
    };

    const videoLayers = ['vision', 'heart', 'sun', 'butterfly', 'wings'];
    let currentVisual = 'vision';

    // Play the default video
    layers.vision.play().catch(() => {});

    document.querySelectorAll('.viz-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.visual;
        if (target === currentVisual) return;

        // Pause all videos, deactivate all layers
        videoLayers.forEach(key => {
          layers[key].pause();
          layers[key].classList.remove('active');
        });
        layers.wizard.classList.remove('active');
        layers.void.classList.remove('active');

        // Update toggle buttons
        document.querySelectorAll('.viz-toggle').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-checked', 'false');
        });

        // Activate selected
        layers[target].classList.add('active');
        btn.classList.add('active');
        btn.setAttribute('aria-checked', 'true');
        currentVisual = target;

        // Play if it's a video
        if (videoLayers.includes(target)) {
          layers[target].play().catch(() => {});
        }
      });
    });

    /* ══════════════════════════════════════════════════════════
       UI SHOW/HIDE
       ══════════════════════════════════════════════════════════ */
    const ui = document.getElementById('viz-ui');
    const hint = document.getElementById('viz-hint');
    let uiVisible = true;
    let hideTimeout = null;

    function scheduleHide() {
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        ui.classList.add('hidden');
        uiVisible = false;
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 2500);
      }, 10000);
    }

    document.addEventListener('click', (e) => {
      if (e.target.closest('.viz-ui') || e.target.closest('.viz-back')) return;
      if (uiVisible) {
        ui.classList.add('hidden');
        uiVisible = false;
      } else {
        ui.classList.remove('hidden');
        uiVisible = true;
        scheduleHide();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (uiVisible) { ui.classList.add('hidden'); uiVisible = false; }
        else { ui.classList.remove('hidden'); uiVisible = true; scheduleHide(); }
      }
    });

    scheduleHide();

    /* ══════════════════════════════════════════════════════════
       MUSIC PLAYER with SC Widget API auto-advance
       ══════════════════════════════════════════════════════════ */
    let tracks = [];
    let currentIndex = 0;
    let isPlaying = false;

    const trackName = document.getElementById('viz-track-name');
    const embedShell = document.getElementById('viz-embed');
    const playBtn = document.getElementById('viz-play');

    fetch('starmilk-tracks.json')
      .then(r => r.json())
      .then(data => {
        tracks = data;
        for (let i = tracks.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [tracks[i], tracks[j]] = [tracks[j], tracks[i]];
        }
        loadTrack(0);
      })
      .catch(() => { trackName.textContent = 'Could not load tracks'; });

    async function bindWidgetAutoAdvance(iframe) {
      try {
        await loadSCAPI();
        if (typeof SC === 'undefined' || !SC.Widget) return;
        scWidget = SC.Widget(iframe);
        scWidget.bind(SC.Widget.Events.FINISH, () => loadTrack(currentIndex + 1));
        scWidget.bind(SC.Widget.Events.ERROR, () => setTimeout(() => loadTrack(currentIndex + 1), 1500));
      } catch (_) {}
    }

    function loadTrack(index) {
      if (!tracks.length) return;
      currentIndex = ((index % tracks.length) + tracks.length) % tracks.length;
      const track = tracks[currentIndex];
      const name = track.name || track.title || 'Unknown Track';
      trackName.textContent = name;

      const url = track.url || track.permalink_url;
      if (url) {
        const encoded = encodeURIComponent(url);
        embedShell.innerHTML = `<iframe
          scrolling="no" frameborder="no" allow="autoplay"
          title="Now playing: ${name.replace(/"/g, '&quot;')}"
          src="https://w.soundcloud.com/player/?url=${encoded}&color=%23c9944a&auto_play=${isPlaying}&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false"
        ></iframe>`;
        const iframe = embedShell.querySelector('iframe');
        if (iframe) bindWidgetAutoAdvance(iframe);
      }
    }

    document.getElementById('viz-prev').addEventListener('click', () => loadTrack(currentIndex - 1));
    document.getElementById('viz-next').addEventListener('click', () => loadTrack(currentIndex + 1));
    document.getElementById('viz-shuffle').addEventListener('click', () => {
      for (let i = tracks.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tracks[i], tracks[j]] = [tracks[j], tracks[i]];
      }
      loadTrack(0);
    });
    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      playBtn.textContent = isPlaying ? '\u23F8 Pause' : '\u25B6 Play';
      playBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
      loadTrack(currentIndex);
    });

    /* ══════════════════════════════════════════════════════════
       AMBIENT PARTICLES
       ══════════════════════════════════════════════════════════ */
    const canvas = document.getElementById('viz-particles');
    const ctx = canvas.getContext('2d');
    const TAU = Math.PI * 2;
    let W, H, particles;
    function rnd(lo, hi) { return lo + Math.random() * (hi - lo); }

    function buildParticles() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      const count = Math.min(60, Math.floor(W * 0.04));
      particles = Array.from({ length: count }, () => ({
        x: rnd(0, W), y: rnd(0, H),
        r: rnd(0.3, 1.6), a: rnd(0.15, 0.6),
        spd: rnd(0.0003, 0.001), ph: rnd(0, TAU),
        dx: rnd(-0.015, 0.015), dy: rnd(-0.008, 0.008),
      }));
    }

    buildParticles();
    window.addEventListener('resize', buildParticles);

    if (REDUCED) {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, TAU);
        ctx.fillStyle = `rgba(213,207,194,${p.a * 0.5})`;
        ctx.fill();
      });
    } else {
      (function loop(ts) {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          p.x += p.dx; p.y += p.dy;
          if (p.x < -2) p.x = W + 2;
          if (p.x > W + 2) p.x = -2;
          if (p.y < -2) p.y = H + 2;
          if (p.y > H + 2) p.y = -2;
          const tw = p.a * (0.5 + 0.5 * Math.sin(ts * p.spd + p.ph));
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, TAU);
          ctx.fillStyle = `rgba(213,207,194,${tw})`;
          ctx.fill();
        });
        requestAnimationFrame(loop);
      })(0);
    }

  })();
  </script>

  <footer style="position:fixed;bottom:4px;right:12px;z-index:5;font-size:.55rem;opacity:.3;color:var(--muted)">
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none">
      Created with Perplexity Computer
    </a>
  </footer>
</body>
</html>
