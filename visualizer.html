<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STARMILK | Visualizer</title>
  <meta name="description" content="Ambient visual listening experience — loop STARMILK art while the music plays." />
  <meta name="theme-color" content="#0b0e1a" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0e1a;
      --card: #121827;
      --purple: #6b5b8a;
      --gold: #c9944a;
      --gold-light: #dbb87a;
      --text: #d5cfc2;
      --muted: #8c8578;
      --radius: 14px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* ── Video backgrounds ── */
    .viz-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.8s ease;
      z-index: 0;
      filter: saturate(0.75) contrast(1.05);
    }
    .viz-video.active { opacity: 1; }

    .viz-image {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.8s ease;
      z-index: 0;
      filter: saturate(0.8) contrast(1.05);
    }
    .viz-image.active { opacity: 1; }

    /* ── Dark vignette overlay ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(11,14,26,.55) 100%),
        linear-gradient(to bottom, rgba(11,14,26,.3) 0%, transparent 12%, transparent 88%, rgba(11,14,26,.5) 100%);
    }

    /* ── Controls UI ── */
    .viz-ui {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 1.5rem;
      background: linear-gradient(to top, rgba(11,14,26,.85) 0%, rgba(11,14,26,.4) 60%, transparent 100%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: opacity .5s ease;
    }

    .viz-ui.hidden { opacity: 0; pointer-events: none; }

    .viz-title {
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
    }

    .viz-track {
      text-align: center;
      font-size: 1.1rem;
      color: var(--text);
      letter-spacing: .04em;
      opacity: .85;
    }

    .viz-toggles {
      display: flex;
      justify-content: center;
      gap: .75rem;
      flex-wrap: wrap;
    }

    .viz-toggle {
      border: 1px solid rgba(140,133,120,.25);
      background: rgba(18,24,39,.7);
      color: var(--text);
      padding: .55rem 1.1rem;
      border-radius: 999px;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .3s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      min-height: 44px;
      display: flex;
      align-items: center;
      touch-action: manipulation;
    }

    .viz-toggle:hover, .viz-toggle:focus-visible {
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .viz-toggle.active {
      border-color: var(--gold);
      background: rgba(201,148,74,.12);
      color: var(--gold-light);
    }

    .viz-controls {
      display: flex;
      justify-content: center;
      gap: .5rem;
    }

    .viz-btn {
      border: 1px solid rgba(140,133,120,.2);
      background: rgba(18,24,39,.6);
      color: var(--text);
      padding: .5rem .9rem;
      border-radius: 999px;
      font-size: .7rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .3s ease;
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: .4rem;
      touch-action: manipulation;
    }

    .viz-btn:hover { border-color: var(--gold); color: var(--gold-light); }

    .viz-back {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      z-index: 10;
      border: 1px solid rgba(140,133,120,.2);
      background: rgba(18,24,39,.6);
      color: var(--muted);
      padding: .45rem .9rem;
      border-radius: 999px;
      font-size: .65rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all .3s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .viz-back:hover { color: var(--gold-light); border-color: var(--gold); }

    .viz-logo {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 10;
      font-size: .7rem;
      letter-spacing: .2em;
      color: var(--muted);
      opacity: .5;
    }

    /* ── SoundCloud embed ── */
    .viz-player {
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .viz-player iframe {
      display: block;
      width: 100%;
      height: 120px;
      border: 0;
      border-radius: 10px;
      opacity: .85;
    }

    /* ── Ambient particle overlay ── */
    #viz-particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Click anywhere hint ── */
    .viz-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      text-align: center;
      opacity: 0;
      transition: opacity .8s ease;
      pointer-events: none;
    }
    .viz-hint.show { opacity: 1; }
    .viz-hint p {
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .viz-ui { padding: 1rem; }
      .viz-toggle { font-size: .65rem; padding: .45rem .8rem; }
      .viz-track { font-size: .95rem; }
    }
  </style>
</head>
<body>

  <!-- Video visuals -->
  <video id="viz-vision" class="viz-video active" autoplay loop muted playsinline>
    <source src="starmilk-vision.mp4" type="video/mp4" />
  </video>

  <!-- Image visual (star wizard as static option) -->
  <img id="viz-wizard" class="viz-image" src="star-wizard.jpg" alt="" />

  <!-- Dark void (no visual, just particles) -->
  <div id="viz-void" class="viz-image" style="background:var(--bg);"></div>

  <div class="vignette"></div>
  <canvas id="viz-particles"></canvas>

  <a href="index.html" class="viz-back">&larr; Back</a>
  <span class="viz-logo">STARMILK</span>

  <div class="viz-hint" id="viz-hint">
    <p>tap anywhere to toggle controls</p>
  </div>

  <div class="viz-ui" id="viz-ui">
    <p class="viz-title">Visual Listening Room</p>

    <!-- Visual toggles -->
    <div class="viz-toggles">
      <button class="viz-toggle active" data-visual="vision">Chalice Dance</button>
      <button class="viz-toggle" data-visual="wizard">Star Wizard</button>
      <button class="viz-toggle" data-visual="void">Deep Void</button>
    </div>

    <!-- Track controls -->
    <p class="viz-track" id="viz-track-name">Loading...</p>

    <div class="viz-controls">
      <button class="viz-btn" id="viz-prev">⏮ Prev</button>
      <button class="viz-btn" id="viz-play">▶ Play</button>
      <button class="viz-btn" id="viz-next">Next ⏭</button>
      <button class="viz-btn" id="viz-shuffle">🔀 Shuffle</button>
    </div>

    <!-- SoundCloud embed -->
    <div class="viz-player">
      <div id="viz-embed"></div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    /* ── Visual Toggling ── */
    const visuals = {
      vision: document.getElementById('viz-vision'),
      wizard: document.getElementById('viz-wizard'),
      void:   document.getElementById('viz-void')
    };

    let currentVisual = 'vision';

    document.querySelectorAll('.viz-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.visual;
        if (target === currentVisual) return;

        // Deactivate all
        Object.values(visuals).forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.viz-toggle').forEach(b => b.classList.remove('active'));

        // Activate selected
        visuals[target].classList.add('active');
        btn.classList.add('active');
        currentVisual = target;

        // Pause/play videos as needed
        if (target === 'vision') {
          visuals.vision.play().catch(() => {});
        } else {
          visuals.vision.pause();
        }
      });
    });

    /* ── UI Show/Hide on tap ── */
    const ui = document.getElementById('viz-ui');
    const hint = document.getElementById('viz-hint');
    let uiVisible = true;
    let hideTimeout = null;

    function scheduleHide() {
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        ui.classList.add('hidden');
        uiVisible = false;
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 2500);
      }, 8000);
    }

    document.addEventListener('click', (e) => {
      if (e.target.closest('.viz-ui') || e.target.closest('.viz-back')) return;
      if (uiVisible) {
        ui.classList.add('hidden');
        uiVisible = false;
      } else {
        ui.classList.remove('hidden');
        uiVisible = true;
        scheduleHide();
      }
    });

    scheduleHide();

    /* ── Music Player (SoundCloud) ── */
    let tracks = [];
    let currentIndex = 0;
    let isPlaying = false;

    const trackName = document.getElementById('viz-track-name');
    const embedShell = document.getElementById('viz-embed');
    const playBtn = document.getElementById('viz-play');

    // Load track catalog
    fetch('starmilk-tracks.json')
      .then(r => r.json())
      .then(data => {
        tracks = data;
        // Shuffle on load
        for (let i = tracks.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [tracks[i], tracks[j]] = [tracks[j], tracks[i]];
        }
        loadTrack(0);
      })
      .catch(() => {
        trackName.textContent = 'Could not load tracks';
      });

    function loadTrack(index) {
      if (!tracks.length) return;
      currentIndex = ((index % tracks.length) + tracks.length) % tracks.length;
      const track = tracks[currentIndex];
      trackName.textContent = track.title || 'Unknown Track';

      // Build SoundCloud embed
      const url = track.url || track.permalink_url;
      if (url) {
        const encoded = encodeURIComponent(url);
        embedShell.innerHTML = `<iframe
          scrolling="no"
          frameborder="no"
          allow="autoplay"
          src="https://w.soundcloud.com/player/?url=${encoded}&color=%23c9944a&auto_play=${isPlaying}&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false"
        ></iframe>`;
      }
    }

    document.getElementById('viz-prev').addEventListener('click', () => { loadTrack(currentIndex - 1); });
    document.getElementById('viz-next').addEventListener('click', () => { loadTrack(currentIndex + 1); });
    document.getElementById('viz-shuffle').addEventListener('click', () => {
      for (let i = tracks.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tracks[i], tracks[j]] = [tracks[j], tracks[i]];
      }
      loadTrack(0);
    });
    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      playBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
      loadTrack(currentIndex);
    });

    /* ── Ambient Particles ── */
    const canvas = document.getElementById('viz-particles');
    const ctx = canvas.getContext('2d');
    const TAU = Math.PI * 2;

    let W, H, particles;
    function rnd(lo, hi) { return lo + Math.random() * (hi - lo); }

    function buildParticles() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      const count = Math.min(80, Math.floor(W * 0.06));
      particles = Array.from({ length: count }, () => ({
        x: rnd(0, W),
        y: rnd(0, H),
        r: rnd(0.3, 1.8),
        a: rnd(0.15, 0.7),
        spd: rnd(0.0003, 0.001),
        ph: rnd(0, TAU),
        dx: rnd(-0.02, 0.02),
        dy: rnd(-0.01, 0.01),
      }));
    }

    buildParticles();
    window.addEventListener('resize', buildParticles);

    function drawParticles(ts) {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < -2) p.x = W + 2;
        if (p.x > W + 2) p.x = -2;
        if (p.y < -2) p.y = H + 2;
        if (p.y > H + 2) p.y = -2;

        const tw = p.a * (0.5 + 0.5 * Math.sin(ts * p.spd + p.ph));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, TAU);
        ctx.fillStyle = `rgba(213,207,194,${tw})`;
        ctx.fill();
      });
      requestAnimationFrame(drawParticles);
    }
    requestAnimationFrame(drawParticles);

  })();
  </script>

  <footer style="position:fixed;bottom:4px;right:12px;z-index:5;font-size:.55rem;opacity:.3;color:var(--muted)">
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none">
      Created with Perplexity Computer
    </a>
  </footer>
</body>
</html>
